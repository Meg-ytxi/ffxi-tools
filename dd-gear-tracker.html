<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>デュナミス～ダイバージェンス～装備管理表</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base:       #0a0c10;
            --bg-panel:      #10141c;
            --bg-card:       #161b26;
            --bg-row-alt:    #12171f;
            --border:        #1e2736;
            --border-bright: #2a3548;
            --accent:        #e8b84b;
            --teal:          #3dd9c6;
            --teal-dim:      rgba(61,217,198,0.12);
            --green:         #2ddb81;
            --red:           #f05252;
            --header-bg:     #0d1117;
            --text-primary:  #e2e8f0;
            --text-secondary:#7a8ba0;
            --text-muted:    #3d4f63;
            --completed-row: rgba(45,219,129,0.07);
            --completed-col: rgba(61,217,198,0.08);
        }

        /*
         * スマホバウンス対策：
         * テーブルは独立したスクロール領域を持たず、
         * ページ全体（html）を横に広げてブラウザ本体でスクロールする。
         * html/body は overflow を制限しない。
         * JSでテーブル幅をページの最小幅として設定する。
         */
        html {
            overscroll-behavior: none;
        }

        .page-wrapper {
            min-height: 100vh;
            background-color: var(--bg-base);
            background-image:
                radial-gradient(ellipse 80% 50% at 50% -10%, rgba(232,184,75,0.06) 0%, transparent 60%),
                linear-gradient(180deg, rgba(13,17,23,0.8) 0%, transparent 100%);
            padding: 24px 16px 40px;
            font-family: 'Noto Sans JP', sans-serif;
            color: var(--text-primary);
        }

        /* 上部UI：画面幅に収める */
        .top-ui {
            max-width: 1280px;
            margin: 0 auto;
            box-sizing: border-box;
        }

        /* ── アプリヘッダー ── */
        .app-header {
            text-align: center;
            margin-bottom: 28px;
        }
        .app-header::after {
            content: '';
            display: block;
            width: 200px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            margin: 12px auto 0;
        }
        .app-title {
            font-family: 'Rajdhani', sans-serif;
            font-size: 2.6rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            color: var(--accent);
            text-shadow: 0 0 30px rgba(232,184,75,0.4), 0 0 60px rgba(232,184,75,0.15);
            margin: 0;
            line-height: 1.1;
        }
        .app-subtitle {
            font-size: 0.78rem;
            color: var(--text-secondary);
            letter-spacing: 0.3em;
            text-transform: uppercase;
            margin-top: 6px;
        }

        /* ── 保存バッジ ── */
        .badge-wrap {
            text-align: center;
            margin-bottom: 16px;
        }
        .save-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(61,217,198,0.08);
            border: 1px solid rgba(61,217,198,0.2);
            color: var(--teal);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.78rem;
            letter-spacing: 0.05em;
        }
        .save-badge .dot {
            width: 6px;
            height: 6px;
            background: var(--teal);
            border-radius: 50%;
            box-shadow: 0 0 6px var(--teal);
            animation: pulse-dot 2s ease-in-out infinite;
        }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.4; }
        }

        /* ── プログレス ── */
        .progress-section {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .progress-label {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--accent);
            letter-spacing: 0.06em;
            white-space: nowrap;
            min-width: 170px;
        }
        .progress-bar-wrap {
            flex: 1;
            min-width: 200px;
            background: rgba(255,255,255,0.04);
            border-radius: 6px;
            height: 22px;
            overflow: hidden;
            border: 1px solid var(--border);
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #2ddb81, #3dd9c6);
            border-radius: 6px;
            transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 8px;
            box-shadow: 0 0 12px rgba(45,219,129,0.4);
        }
        .progress-fill-text {
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            color: #0a0c10;
            letter-spacing: 0.05em;
            white-space: nowrap;
        }

        /* ── ボタン ── */
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 18px;
            justify-content: center;
        }
        .btn {
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            padding: 9px 18px;
            border-radius: 7px;
            border: 1px solid var(--border-bright);
            cursor: pointer;
            transition: all 0.18s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--bg-card);
            color: var(--text-primary);
        }
        .btn:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(0,0,0,0.3); }
        .btn-export { background: rgba(45,219,129,0.1);  border-color: rgba(45,219,129,0.35); color: var(--green); }
        .btn-export:hover { background: rgba(45,219,129,0.18); }
        .btn-import { background: rgba(61,217,198,0.08);  border-color: rgba(61,217,198,0.3);  color: var(--teal); }
        .btn-import:hover { background: rgba(61,217,198,0.15); }
        .btn-reset  { background: rgba(240,82,82,0.08);   border-color: rgba(240,82,82,0.3);   color: var(--red); }
        .btn-reset:hover  { background: rgba(240,82,82,0.15); }
        .btn-stats  { background: rgba(232,184,75,0.08);  border-color: rgba(232,184,75,0.3);  color: var(--accent); }
        .btn-stats:hover  { background: rgba(232,184,75,0.15); }
        .btn-test   { background: rgba(138,92,246,0.1);   border-color: rgba(138,92,246,0.3);  color: #a78bfa; }
        .btn-test:hover   { background: rgba(138,92,246,0.18); }

        /* ── テーブル外枠 ──
           overflow は持たない。スクロールはページ全体で行う。
        ── */
        .table-outer {
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            background: var(--bg-panel);
            overflow: hidden;
        }

        /* ── テーブル ── */
        .main-table {
            width: 100%;
            border-collapse: collapse;
            background: transparent;
        }
        .main-table th,
        .main-table td {
            border: 1px solid var(--border);
            padding: 10px 12px;
            text-align: center;
            vertical-align: middle;
        }
        .main-table thead {
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .main-table th {
            background: var(--header-bg);
            font-family: 'Rajdhani', sans-serif;
            font-weight: 600;
            font-size: 0.88rem;
            letter-spacing: 0.07em;
            text-transform: uppercase;
            color: var(--accent);
            white-space: nowrap;
        }
        .th-sub {
            display: block;
            font-size: 0.72rem;
            color: var(--text-muted);
            letter-spacing: 0.04em;
            margin-top: 3px;
            font-weight: 500;
            text-transform: none;
        }
        .th-job      { color: var(--text-secondary); min-width: 72px; }
        .th-progress { color: var(--text-secondary); }

        .main-table th:first-child {
            position: sticky;
            left: 0;
            z-index: 11;
            background: var(--header-bg);
        }
        .main-table td:first-child {
            position: sticky;
            left: 0;
            z-index: 5;
            background: var(--bg-card);
        }

        .main-table tbody tr { transition: background 0.15s ease; }
        .main-table tbody tr:nth-child(even)                { background: var(--bg-row-alt); }
        .main-table tbody tr:nth-child(even) td:first-child { background: #0f1319; }
        .main-table tbody tr:hover                          { background: rgba(232,184,75,0.04); }
        .main-table tbody tr:hover td:first-child           { background: rgba(232,184,75,0.06); }

        .job-name {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 1.05rem;
            color: var(--text-primary);
            letter-spacing: 0.06em;
        }
        .job-progress-text {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 2px;
            letter-spacing: 0.04em;
        }

        .completed-row                { background: var(--completed-row) !important; }
        .completed-row td:first-child { background: rgba(45,219,129,0.1) !important; }
        .completed-column             { background-color: var(--completed-col) !important; }
        .completed-column-header      { background-color: rgba(61,217,198,0.15) !important; color: var(--teal) !important; }

        .progress-cell {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 0.05em;
        }

        .main-table input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border: 2px solid var(--border-bright);
            border-radius: 4px;
            background: rgba(255,255,255,0.03);
            cursor: pointer;
            transition: all 0.15s ease;
            position: relative;
            display: inline-block;
            vertical-align: middle;
        }
        .main-table input[type="checkbox"]:hover  { border-color: var(--teal); background: var(--teal-dim); }
        .main-table input[type="checkbox"]:checked {
            background: var(--teal);
            border-color: var(--teal);
            box-shadow: 0 0 8px rgba(61,217,198,0.5);
        }
        .main-table input[type="checkbox"]:checked::after {
            content: '';
            position: absolute;
            top: 2px; left: 6px;
            width: 5px; height: 10px;
            border: 2px solid #0a0c10;
            border-top: none; border-left: none;
            transform: rotate(45deg);
        }

        .last-saved {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-align: center;
            margin-top: 12px;
            letter-spacing: 0.05em;
        }

        @media (max-width: 768px) {
            .app-title { font-size: 1.9rem; }
            .progress-label { min-width: auto; font-size: 1.1rem; }
            .main-table th, .main-table td { padding: 8px 8px; }
        }
    </style>
</head>
<body>
<div class="page-wrapper">

    <!-- 上部UI：画面幅内に収める -->
    <div class="top-ui">
        <header class="app-header">
            <h1 class="app-title">⚔ デュナミス～ダイバージェンス～装備管理表 ⚔</h1>
            <p class="app-subtitle">Equipment Tracker — localStorage Edition</p>
        </header>

        <div class="badge-wrap">
            <span class="save-badge">
                <span class="dot"></span>
                ブラウザに自動保存されます（localStorage使用）
            </span>
        </div>

        <div class="progress-section">
            <div class="progress-label" id="total-progress">進捗: 0 / 220 (0%)</div>
            <div class="progress-bar-wrap">
                <div class="progress-fill" id="progress-fill" style="width:0%">
                    <span class="progress-fill-text" id="progress-fill-text">0%</span>
                </div>
            </div>
        </div>

        <div class="controls">
            <button class="btn btn-export" onclick="exportProgress()">📤 JSONエクスポート</button>
            <button class="btn btn-import" onclick="importProgress()">📥 JSONインポート</button>
            <button class="btn btn-reset"  onclick="resetAll()">🔄 全リセット</button>
            <button class="btn btn-stats"  onclick="showStats()">📊 統計表示</button>
            <button class="btn btn-test"   onclick="testLocalStorage()">🔧 保存テスト</button>
        </div>
    </div><!-- /.top-ui -->

    <!-- テーブル：ページ全体の幅で横スクロール -->
    <div class="table-outer" id="table-outer">
        <table class="main-table" id="management-table">
            <thead>
                <tr>
                    <th class="th-job">ジョブ / 部位</th>
                    <th>Head<span class="th-sub">(Win) +2</span></th>
                    <th>Head<span class="th-sub">(Win) +3</span></th>
                    <th>Body<span class="th-sub">(All) +2</span></th>
                    <th>Body<span class="th-sub">(All) +3</span></th>
                    <th>Hands<span class="th-sub">(Bas) +2</span></th>
                    <th>Hands<span class="th-sub">(Bas) +3</span></th>
                    <th>Legs<span class="th-sub">(Jeu) +2</span></th>
                    <th>Legs<span class="th-sub">(Jeu) +3</span></th>
                    <th>Feet<span class="th-sub">(San) +2</span></th>
                    <th>Feet<span class="th-sub">(San) +3</span></th>
                    <th class="th-progress">進捗</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>

    <div class="last-saved" id="last-saved"></div>
</div>

<script>
    var jobs = ['WAR','MNK','WHM','BLM','RDM','THF','PLD','DRK','BST','BRD',
                'RNG','SAM','NIN','DRG','SMN','BLU','COR','PUP','DNC','SCH','GEO','RUN'];
    var baseSlots  = ['head','body','hands','legs','feet'];
    var slotNames  = ['Head (Win)','Body (All)','Hands (Bas)','Legs (Jeu)','Feet (San)'];
    var levels     = ['+2','+3'];
    var STORAGE_KEY = 'dd_equipment_progress';
    var checkboxStates = {};

    function saveToLocalStorage() {
        try {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(checkboxStates));
            var now = new Date().toLocaleString('ja-JP');
            document.getElementById('last-saved').textContent = '最終保存: ' + now;
        } catch(e) {
            alert('データの保存に失敗しました。');
        }
    }

    function loadFromLocalStorage() {
        try {
            var saved = localStorage.getItem(STORAGE_KEY);
            if (!saved) { checkboxStates = {}; return false; }
            var parsed = JSON.parse(saved);
            if (typeof parsed === 'object' && parsed !== null) { checkboxStates = parsed; return true; }
            localStorage.removeItem(STORAGE_KEY);
            checkboxStates = {};
            return false;
        } catch(e) {
            try { localStorage.removeItem(STORAGE_KEY); } catch(_) {}
            checkboxStates = {};
            return false;
        }
    }

    function clearLocalStorage() {
        try { localStorage.removeItem(STORAGE_KEY); document.getElementById('last-saved').textContent = ''; } catch(e) {}
    }

    function initTable() {
        var tableBody = document.getElementById('table-body');
        tableBody.innerHTML = '';
        var loaded = loadFromLocalStorage();

        jobs.forEach(function(job) {
            var row = document.createElement('tr');
            row.id = 'row-' + job;
            var jobCell = document.createElement('td');
            jobCell.innerHTML = '<div class="job-name">' + job + '</div><div class="job-progress-text" id="progress-' + job + '">0 / 10</div>';
            row.appendChild(jobCell);

            baseSlots.forEach(function(baseSlot) {
                levels.forEach(function(level) {
                    var cell = document.createElement('td');
                    var cb = document.createElement('input');
                    cb.type = 'checkbox';
                    cb.id = job + '-' + baseSlot + '-' + level;
                    cb.checked = checkboxStates[cb.id] === true;
                    cb.addEventListener('change', function() { updateProgress(); saveToLocalStorage(); });
                    cell.appendChild(cb);
                    row.appendChild(cell);
                });
            });

            var pCell = document.createElement('td');
            pCell.id = 'job-progress-' + job;
            pCell.className = 'progress-cell';
            pCell.innerHTML = '<span style="color:var(--text-muted)">0%</span>';
            row.appendChild(pCell);
            tableBody.appendChild(row);
        });

        updateProgress();
        document.getElementById('last-saved').textContent = loaded ? 'データをブラウザから復元しました' : '新規データです';

        // テーブル幅をページの最小幅に設定してバウンスを防ぐ
        syncPageWidth();
        window.addEventListener('resize', syncPageWidth);
    }

    function syncPageWidth() {
        var table = document.getElementById('management-table');
        var outer = document.getElementById('table-outer');
        var wrapper = document.querySelector('.page-wrapper');
        if (!table || !outer || !wrapper) return;
        // いったんリセットしてから自然な幅を計測
        wrapper.style.minWidth = '';
        var tableWidth = table.scrollWidth + 32; // padding分を加算
        var viewWidth  = window.innerWidth;
        if (tableWidth > viewWidth) {
            wrapper.style.minWidth = tableWidth + 'px';
        } else {
            wrapper.style.minWidth = '';
        }
    }

    function updateProgress() {
        var totalChecked = 0;
        var totalItems = jobs.length * baseSlots.length * levels.length;

        jobs.forEach(function(job) {
            var jobChecked = 0;
            baseSlots.forEach(function(slot) {
                levels.forEach(function(level) {
                    var cb = document.getElementById(job + '-' + slot + '-' + level);
                    if (cb.checked) { jobChecked++; totalChecked++; checkboxStates[cb.id] = true; }
                    else { checkboxStates[cb.id] = false; }
                });
            });
            var pct = Math.round(jobChecked / (baseSlots.length * levels.length) * 100);
            document.getElementById('progress-' + job).textContent = jobChecked + ' / 10';
            var color = pct === 100 ? 'var(--green)' : pct > 0 ? 'var(--teal)' : 'var(--text-muted)';
            document.getElementById('job-progress-' + job).innerHTML = '<span style="color:' + color + '">' + pct + '%</span>';
            var row = document.getElementById('row-' + job);
            if (jobChecked === baseSlots.length * levels.length) row.classList.add('completed-row');
            else row.classList.remove('completed-row');
        });

        updateColumnHighlight();

        var pct = Math.round(totalChecked / totalItems * 100);
        document.getElementById('total-progress').textContent = '進捗: ' + totalChecked + ' / ' + totalItems + ' (' + pct + '%)';
        document.getElementById('progress-fill').style.width = pct + '%';
        document.getElementById('progress-fill-text').textContent = pct + '%';
    }

    function updateColumnHighlight() {
        baseSlots.forEach(function(slot, si) {
            levels.forEach(function(level, li) {
                var done = true;
                jobs.forEach(function(job) { if (!document.getElementById(job+'-'+slot+'-'+level).checked) done = false; });
                var col = si * 2 + li + 2;
                var table = document.getElementById('management-table');
                table.querySelectorAll('td:nth-child(' + col + ')').forEach(function(c) { done ? c.classList.add('completed-column') : c.classList.remove('completed-column'); });
                table.querySelectorAll('th:nth-child(' + col + ')').forEach(function(h) { done ? h.classList.add('completed-column-header') : h.classList.remove('completed-column-header'); });
            });
        });
    }

    function resetAll() {
        if (!confirm('すべての進捗をリセットしますか？')) return;
        jobs.forEach(function(job) {
            baseSlots.forEach(function(slot) {
                levels.forEach(function(level) {
                    var cb = document.getElementById(job+'-'+slot+'-'+level);
                    cb.checked = false; checkboxStates[cb.id] = false;
                });
            });
        });
        clearLocalStorage(); updateProgress();
    }

    function exportProgress() {
        var blob = new Blob([JSON.stringify({timestamp:new Date().toISOString(),version:'2.0',data:checkboxStates},null,2)],{type:'application/json'});
        var a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'dd_progress_' + new Date().toISOString().split('T')[0] + '.json';
        a.click(); URL.revokeObjectURL(a.href);
        alert('エクスポートしました。');
    }

    function importProgress() {
        var input = document.createElement('input');
        input.type = 'file'; input.accept = '.json';
        input.onchange = function(e) {
            var file = e.target.files[0]; if (!file) return;
            var reader = new FileReader();
            reader.onload = function(ev) {
                try {
                    var d = JSON.parse(ev.target.result);
                    checkboxStates = d.data || d;
                    jobs.forEach(function(job) {
                        baseSlots.forEach(function(slot) {
                            levels.forEach(function(level) {
                                var cb = document.getElementById(job+'-'+slot+'-'+level);
                                cb.checked = checkboxStates[cb.id] || false;
                            });
                        });
                    });
                    updateProgress(); saveToLocalStorage();
                    alert('インポートしました。');
                } catch(_) { alert('読み込みに失敗しました。'); }
            };
            reader.readAsText(file);
        };
        input.click();
    }

    function showStats() {
        var done=0, partial=0, stats={};
        baseSlots.forEach(function(s){levels.forEach(function(l){stats[s+'-'+l]=0;});});
        jobs.forEach(function(job) {
            var n=0;
            baseSlots.forEach(function(s){levels.forEach(function(l){if(document.getElementById(job+'-'+s+'-'+l).checked){n++;stats[s+'-'+l]++;}});});
            if(n===10)done++; else if(n>0)partial++;
        });
        var msg='📊 統計情報 📊\n\n完了:'+done+'/'+jobs.length+'\n進行中:'+partial+'/'+jobs.length+'\n未着手:'+(jobs.length-done-partial)+'/'+jobs.length+'\n\n部位別:\n';
        baseSlots.forEach(function(s,i){msg+=slotNames[i]+' +2:'+stats[s+'-+2']+'/'+jobs.length+'  +3:'+stats[s+'-+3']+'/'+jobs.length+'\n';});
        alert(msg);
    }

    function testLocalStorage() {
        try {
            localStorage.setItem('_test','1'); localStorage.removeItem('_test');
            alert('LocalStorage は正常に動作しています！');
        } catch(e) { alert('LocalStorage エラー: '+e.message); }
    }

    window.onload = initTable;
</script>
</body>
</html>
