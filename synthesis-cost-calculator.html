<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FFXI 合成原価計算ツール</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep:     #0a0c12;
            --bg-panel:    #10141e;
            --bg-card:     #161c2a;
            --bg-input:    #1c2436;
            --border:      #2a3650;
            --border-glow: #3d5a9a;
            --gold:        #c9a84c;
            --gold-light:  #e8c96d;
            --gold-dim:    #7a6128;
            --cyan:        #4fc3f7;
            --cyan-dim:    #1a5c7a;
            --green:       #4caf82;
            --green-dim:   #1a4a35;
            --red:         #e05555;
            --red-dim:     #4a1a1a;
            --text-bright: #e8ecf4;
            --text-mid:    #8a96b0;
            --text-dim:    #4a5570;
            --crystal:     #6eb5ff;
        }

        .page-wrapper {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: var(--bg-deep);
            min-height: 100vh;
            padding: 24px 16px 60px;
            color: var(--text-bright);
            background-image:
                radial-gradient(ellipse 80% 50% at 50% -20%, rgba(61,90,154,0.25) 0%, transparent 70%),
                url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%232a3650' fill-opacity='0.18'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            box-sizing: border-box;
            width: 100%;
        }

        /* ── ヘッダー ── */
        .header {
            text-align: center;
            margin-bottom: 36px;
            position: relative;
        }
        .header-title {
            font-family: 'Cinzel', serif;
            font-size: 1.9em;
            font-weight: 700;
            color: var(--gold-light);
            letter-spacing: 0.08em;
            text-shadow: 0 0 24px rgba(201,168,76,0.5);
            margin-bottom: 4px;
        }
        .header-sub {
            font-size: 0.78em;
            color: var(--text-mid);
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }
        .header-line {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 16px;
        }
        .header-line-bar {
            flex: 1;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--gold-dim), transparent);
        }
        .header-crystal {
            font-size: 1.4em;
            filter: drop-shadow(0 0 8px var(--crystal));
        }

        /* ── パネル ── */
        .panel {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            position: relative;
            overflow: visible;
            box-sizing: border-box;
            width: 100%;
        }
        .panel::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 12px;
            background: linear-gradient(135deg, rgba(61,90,154,0.07) 0%, transparent 60%);
            pointer-events: none;
        }
        .panel-title {
            font-family: 'Cinzel', serif;
            font-size: 0.9em;
            font-weight: 600;
            color: var(--gold);
            letter-spacing: 0.12em;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .panel-title-icon {
            font-size: 1.1em;
        }
        .panel-title-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(to right, var(--border-glow), transparent);
        }

        /* ── 素材グリッド ── */
        .materials-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(min(160px, 100%), 1fr));
            gap: 14px;
            box-sizing: border-box;
            width: 100%;
            min-width: 0;
        }

        .material-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px;
            transition: border-color 0.2s, box-shadow 0.2s;
            box-sizing: border-box;
            min-width: 0;
        }
        .material-card:hover {
            border-color: var(--border-glow);
            box-shadow: 0 0 12px rgba(61,90,154,0.2);
        }
        .material-card-label {
            font-size: 0.72em;
            font-weight: 700;
            color: var(--cyan);
            letter-spacing: 0.18em;
            text-transform: uppercase;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .material-card-label::before {
            content: '◈';
            color: var(--crystal);
            font-size: 0.9em;
        }

        .field-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .field-row {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }
        .field-label {
            font-size: 0.68em;
            color: var(--text-mid);
            letter-spacing: 0.05em;
        }
        .field-input {
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 5px;
            color: var(--text-bright);
            font-family: 'Noto Sans JP', sans-serif;
            font-size: 0.85em;
            padding: 7px 10px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            width: 100%;
            box-sizing: border-box;
        }
        .field-input::placeholder { color: var(--text-dim); }
        .field-input:focus {
            border-color: var(--cyan-dim);
            box-shadow: 0 0 0 2px rgba(79,195,247,0.12);
        }
        /* Chrome/Edge スピナー非表示 */
        .field-input[type=number]::-webkit-inner-spin-button,
        .field-input[type=number]::-webkit-outer-spin-button,
        .save-label-input[type=number]::-webkit-inner-spin-button,
        .save-label-input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
        .field-input[type=number],
        .save-label-input[type=number] { -moz-appearance: textfield; }

        /* ── 合成結果入力 ── */
        .result-input-row {
            display: flex;
            align-items: flex-end;
            gap: 16px;
            flex-wrap: wrap;
        }
        .result-input-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .result-input-group label {
            font-size: 0.75em;
            color: var(--text-mid);
        }
        .result-input-group .field-input {
            width: 160px;
        }

        /* ── ボタン ── */
        .btn-primary {
            background: linear-gradient(135deg, #1e3a6e 0%, #2d5299 100%);
            color: var(--gold-light);
            border: 1px solid var(--border-glow);
            border-radius: 8px;
            font-family: 'Cinzel', serif;
            font-size: 0.85em;
            font-weight: 600;
            letter-spacing: 0.1em;
            padding: 12px 28px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #2d5299 0%, #3d6bc8 100%);
            box-shadow: 0 0 20px rgba(61,90,154,0.5);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: transparent;
            color: var(--gold);
            border: 1px solid var(--gold-dim);
            border-radius: 6px;
            font-family: 'Noto Sans JP', sans-serif;
            font-size: 0.8em;
            padding: 8px 18px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-secondary:hover {
            background: rgba(201,168,76,0.1);
            border-color: var(--gold);
        }

        .btn-danger {
            background: transparent;
            color: var(--red);
            border: 1px solid var(--red-dim);
            border-radius: 5px;
            font-size: 0.75em;
            padding: 4px 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-danger:hover {
            background: rgba(224,85,85,0.12);
            border-color: var(--red);
        }

        .btn-load {
            background: transparent;
            color: var(--cyan);
            border: 1px solid var(--cyan-dim);
            border-radius: 5px;
            font-size: 0.75em;
            padding: 4px 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-load:hover {
            background: rgba(79,195,247,0.1);
            border-color: var(--cyan);
        }

        /* ── 計算ボタン列 ── */
        .calc-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .save-label-input {
            flex: 1;
            min-width: 160px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-bright);
            font-family: 'Noto Sans JP', sans-serif;
            font-size: 0.82em;
            padding: 9px 12px;
            outline: none;
            transition: border-color 0.2s;
        }
        .save-label-input::placeholder { color: var(--text-dim); }
        .save-label-input:focus { border-color: var(--cyan-dim); }

        /* ── 損失詳細 ── */
        .loss-detail {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px 16px;
            font-size: 0.8em;
            color: var(--text-mid);
            line-height: 1.9;
            margin-top: 16px;
            display: none;
        }
        .loss-detail-title {
            color: var(--gold);
            font-weight: 700;
            margin-bottom: 6px;
            font-size: 0.9em;
        }
        .loss-highlight-green { color: var(--green); font-weight: 700; }
        .loss-highlight-cyan  { color: var(--cyan);  font-weight: 700; }

        /* ── 計算結果 ── */
        .results-panel {
            display: none;
        }
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }
        .result-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px 16px;
        }
        .result-card-label {
            font-size: 0.7em;
            color: var(--text-mid);
            letter-spacing: 0.06em;
            margin-bottom: 6px;
        }
        .result-card-value {
            font-size: 1.1em;
            font-weight: 700;
            color: var(--gold-light);
            font-variant-numeric: tabular-nums;
        }
        .result-card-value.is-cyan  { color: var(--cyan); }
        .result-card-value.is-green { color: var(--green); }

        /* 利益計算 */
        .profit-row {
            display: flex;
            align-items: flex-end;
            gap: 12px;
            flex-wrap: wrap;
        }
        .profit-result-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px 18px;
            margin-top: 14px;
            font-size: 0.9em;
            line-height: 2;
            display: none;
        }
        .profit-result-box.is-profit { border-color: var(--green); }
        .profit-result-box.is-loss   { border-color: var(--red); }
        .profit-positive { color: var(--green); font-weight: 700; }
        .profit-negative { color: var(--red);   font-weight: 700; }

        /* ── 保存一覧 ── */
        .saved-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .saved-item {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: border-color 0.2s;
        }
        .saved-item:hover { border-color: var(--border-glow); }
        .saved-item-index {
            font-family: 'Cinzel', serif;
            font-size: 0.85em;
            color: var(--text-dim);
            min-width: 22px;
            text-align: right;
        }
        .saved-item-info {
            flex: 1;
            min-width: 0;
        }
        .saved-item-name {
            font-size: 0.88em;
            font-weight: 700;
            color: var(--text-bright);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .saved-item-meta {
            font-size: 0.7em;
            color: var(--text-mid);
            margin-top: 2px;
        }
        .saved-item-cost {
            font-size: 0.88em;
            font-weight: 700;
            color: var(--gold);
            white-space: nowrap;
        }
        .saved-item-actions {
            display: flex;
            gap: 6px;
        }
        .saved-item-auction {
            font-size: 0.72em;
            color: var(--gold);
            margin-top: 3px;
        }
        .saved-profit-pos { color: var(--green); font-weight: 700; }
        .saved-profit-neg { color: var(--red);   font-weight: 700; }
        .saved-empty {
            text-align: center;
            color: var(--text-dim);
            font-size: 0.82em;
            padding: 24px 0;
        }

        /* ── トースト通知 ── */
        .toast {
            position: fixed;
            bottom: 28px;
            right: 24px;
            background: var(--bg-panel);
            border: 1px solid var(--border-glow);
            border-radius: 8px;
            padding: 12px 20px;
            font-size: 0.82em;
            color: var(--text-bright);
            box-shadow: 0 4px 24px rgba(0,0,0,0.5);
            opacity: 0;
            transform: translateY(12px);
            transition: all 0.3s;
            pointer-events: none;
            z-index: 999;
        }
        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>
<div class="page-wrapper">
<div class="container">

    <!-- ヘッダー -->
    <div class="header">
        <div class="header-title">⚔ FFXI 合成原価計算ツール</div>
        <div class="header-sub">Synthesis Cost Calculator</div>
        <div class="header-line">
            <div class="header-line-bar"></div>
            <div class="header-crystal">🔮</div>
            <div class="header-line-bar"></div>
        </div>
    </div>

    <!-- 素材データ入力 -->
    <div class="panel">
        <div class="panel-title">
            <span class="panel-title-icon">📦</span>
            素材データ入力
            <div class="panel-title-line"></div>
        </div>
        <div class="materials-grid" id="materialsGrid">
            <!-- JS で生成 -->
        </div>
    </div>

    <!-- 合成結果入力 -->
    <div class="panel">
        <div class="panel-title">
            <span class="panel-title-icon">🎯</span>
            合成結果入力
            <div class="panel-title-line"></div>
        </div>
        <div class="result-input-row">
            <div class="result-input-group">
                <label for="successCount">成功回数</label>
                <input class="field-input" type="number" id="successCount" min="0">
            </div>
        </div>

        <div class="loss-detail" id="lossDetail">
            <div class="loss-detail-title">💰 損失計算の内訳</div>
            <div id="lossDetailContent"></div>
        </div>

        <div class="calc-bar">
            <input class="save-label-input" type="text" id="saveLabel" placeholder="保存名" maxlength="30">
            <input class="save-label-input" type="number" id="auctionPrice" placeholder="競売価格" step="0.1" style="max-width:200px;">
            <button class="btn-primary" id="calcBtn">💰 計算して保存</button>
            <button class="btn-secondary" id="calcOnlyBtn">計算のみ</button>
        </div>
    </div>

    <!-- 計算結果 -->
    <div class="panel results-panel" id="resultsPanel">
        <div class="panel-title">
            <span class="panel-title-icon">📊</span>
            計算結果
            <div class="panel-title-line"></div>
        </div>
        <div class="results-grid">
            <div class="result-card">
                <div class="result-card-label">成功品数</div>
                <div class="result-card-value is-cyan" id="res_success">—</div>
            </div>
            <div class="result-card">
                <div class="result-card-label">素材購入総額</div>
                <div class="result-card-value" id="res_purchase">—</div>
            </div>
            <div class="result-card">
                <div class="result-card-label">残った素材の価値</div>
                <div class="result-card-value" id="res_remaining">—</div>
            </div>
            <div class="result-card">
                <div class="result-card-label">実質損失</div>
                <div class="result-card-value" id="res_loss">—</div>
            </div>
            <div class="result-card">
                <div class="result-card-label">成功品1個あたりの原価</div>
                <div class="result-card-value is-green" id="res_costper">—</div>
            </div>
            <div class="result-card">
                <div class="result-card-label">損益分岐点（売値）</div>
                <div class="result-card-value" id="res_breakeven">—</div>
            </div>
            <div class="result-card">
                <div class="result-card-label">推奨売値（利益10%）</div>
                <div class="result-card-value" id="res_recommend">—</div>
            </div>
        </div>

        <!-- 利益計算 -->
        <div class="panel-title" style="margin-top:8px;">
            <span class="panel-title-icon">💸</span>
            利益計算
            <div class="panel-title-line"></div>
        </div>
        <div class="profit-row">
            <div class="result-input-group">
                <label for="sellPrice">売値（万ギル）</label>
                <input class="field-input" type="number" id="sellPrice" placeholder="例: 200" step="0.1">
            </div>
            <button class="btn-secondary" id="profitBtn">利益計算</button>
        </div>
        <div class="profit-result-box" id="profitResultBox"></div>
    </div>

    <!-- 保存データ一覧 -->
    <div class="panel">
        <div class="panel-title">
            <span class="panel-title-icon">💾</span>
            保存データ一覧
            <span id="savedCount" style="font-size:0.8em;color:var(--text-mid);margin-left:4px;font-family:'Noto Sans JP';">0 / 10</span>
            <div class="panel-title-line"></div>
            <button class="btn-secondary" id="clearAllBtn" style="font-size:0.72em;padding:5px 12px;">全削除</button>
        </div>
        <div class="saved-list" id="savedList">
            <div class="saved-empty">保存データはありません</div>
        </div>
    </div>

</div>
</div>

<!-- トースト -->
<div class="toast" id="toast"></div>

<script>
    // ── 素材カード生成 ──────────────────────────────────
    const grid = document.getElementById('materialsGrid');
    for (let i = 1; i <= 8; i++) {
        grid.innerHTML += `
        <div class="material-card">
            <div class="material-card-label">素材 ${i}</div>
            <div class="field-group">
                <div class="field-row">
                    <div class="field-label">価格（万ギル）</div>
                    <input class="field-input" type="number" id="m${i}_price" step="0.1">
                </div>
                <div class="field-row">
                    <div class="field-label">用意した数</div>
                    <input class="field-input" type="number" id="m${i}_prep">
                </div>
                <div class="field-row">
                    <div class="field-label">残った数</div>
                    <input class="field-input" type="number" id="m${i}_rem">
                </div>
            </div>
        </div>`;
    }

    // ── 状態 ──────────────────────────────────────────
    let currentCostPerItem = 0;
    let currentSuccessCount = 0;
    const MAX_SAVES = 10;
    const STORAGE_KEY = 'ffxi_saves';

    // ── ストレージ ─────────────────────────────────────
    function loadSaves() {
        try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
        catch { return []; }
    }
    function storeSaves(list) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
    }

    // ── トースト ───────────────────────────────────────
    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2400);
    }

    // ── 計算コア ───────────────────────────────────────
    function collectMaterials() {
        const list = [];
        let totalPurchase = 0, totalRemaining = 0, hasData = false;
        for (let i = 1; i <= 8; i++) {
            const price  = parseFloat(document.getElementById(`m${i}_price`).value) || 0;
            const prep   = parseInt(document.getElementById(`m${i}_prep`).value)   || 0;
            const rem    = parseInt(document.getElementById(`m${i}_rem`).value)    || 0;
            const used   = Math.max(0, prep - rem);
            list.push({ name: `素材${i}`, price, prep, rem, used });
            if (price > 0 && prep > 0) {
                hasData = true;
                totalPurchase  += price * prep;
                totalRemaining += price * rem;
            }
        }
        return { list, totalPurchase, totalRemaining, hasData };
    }

    function doCalculate() {
        const { list, totalPurchase, totalRemaining, hasData } = collectMaterials();
        const successCount = parseInt(document.getElementById('successCount').value) || 0;

        if (!hasData) { showToast('⚠ 素材データを入力してください'); return null; }
        if (successCount === 0) { showToast('⚠ 成功回数を入力してください'); return null; }

        const actualLoss   = totalPurchase - totalRemaining;
        const costPerItem  = actualLoss / successCount;
        const breakEven    = costPerItem;
        const recommended  = costPerItem * 1.1;

        // 詳細
        let detailHtml = '';
        list.forEach(m => {
            if (m.price > 0 && m.prep > 0) {
                const pc = m.price * m.prep, rc = m.price * m.rem;
                detailHtml += `${m.name}: ${m.prep}個購入(${pc.toFixed(1)}万) → ${m.rem}個残存(${rc.toFixed(1)}万)<br>`;
            }
        });
        detailHtml += `<span class="loss-highlight-green">実質損失: ${actualLoss.toFixed(1)}万ギル</span><br>`;
        detailHtml += `<span class="loss-highlight-cyan">成功品${successCount}個の原価: ${costPerItem.toFixed(1)}万ギル/個</span>`;
        document.getElementById('lossDetailContent').innerHTML = detailHtml;
        document.getElementById('lossDetail').style.display = 'block';

        // 結果表示
        document.getElementById('res_success').textContent   = `${successCount}個`;
        document.getElementById('res_purchase').textContent  = `${totalPurchase.toFixed(1)}万ギル`;
        document.getElementById('res_remaining').textContent = `${totalRemaining.toFixed(1)}万ギル`;
        document.getElementById('res_loss').textContent      = `${actualLoss.toFixed(1)}万ギル`;
        document.getElementById('res_costper').textContent   = `${costPerItem.toFixed(1)}万ギル`;
        document.getElementById('res_breakeven').textContent = `${breakEven.toFixed(1)}万ギル`;
        document.getElementById('res_recommend').textContent = `${recommended.toFixed(1)}万ギル`;
        document.getElementById('resultsPanel').style.display = 'block';
        document.getElementById('profitResultBox').style.display = 'none';

        currentCostPerItem  = costPerItem;
        currentSuccessCount = successCount;

        return { successCount, totalPurchase, totalRemaining, actualLoss, costPerItem, breakEven, recommended, materials: list };
    }

    // ── 保存処理 ───────────────────────────────────────
    function saveRecord(result) {
        const saves = loadSaves();
        if (saves.length >= MAX_SAVES) { showToast(`⚠ 保存は最大${MAX_SAVES}件です。古いデータを削除してください`); return; }
        const label = document.getElementById('saveLabel').value.trim() || `合成 ${new Date().toLocaleDateString('ja-JP')}`;
        const auctionPrice = parseFloat(document.getElementById('auctionPrice').value) || null;
        const record = {
            id: Date.now(),
            label,
            date: new Date().toLocaleString('ja-JP'),
            successCount: result.successCount,
            totalPurchase: result.totalPurchase,
            costPerItem: result.costPerItem,
            auctionPrice,
            materials: result.materials.filter(m => m.price > 0 && m.prep > 0)
        };
        saves.push(record);
        storeSaves(saves);
        renderSavedList();
        showToast(`✅ 「${label}」を保存しました`);
    }

    // ── 保存一覧描画 ──────────────────────────────────
    function renderSavedList() {
        const saves = loadSaves();
        const container = document.getElementById('savedList');
        document.getElementById('savedCount').textContent = `${saves.length} / ${MAX_SAVES}`;

        if (saves.length === 0) {
            container.innerHTML = '<div class="saved-empty">保存データはありません</div>';
            return;
        }
        container.innerHTML = saves.map((s, idx) => {
            const profitPer = s.auctionPrice != null ? s.auctionPrice - s.costPerItem : null;
            const profitHtml = s.auctionPrice != null
                ? `<div class="saved-item-auction">
                     🏪 ${s.auctionPrice.toFixed(1)}万G
                     <span class="${profitPer >= 0 ? 'saved-profit-pos' : 'saved-profit-neg'}">
                       (${profitPer >= 0 ? '+' : ''}${profitPer.toFixed(1)}万)
                     </span>
                   </div>`
                : '';
            return `
            <div class="saved-item" data-id="${s.id}">
                <div class="saved-item-index">${idx + 1}</div>
                <div class="saved-item-info">
                    <div class="saved-item-name">${escHtml(s.label)}</div>
                    <div class="saved-item-meta">${s.date} ／ 成功${s.successCount}個</div>
                    ${profitHtml}
                </div>
                <div class="saved-item-cost">${s.costPerItem.toFixed(1)}万G/個</div>
                <div class="saved-item-actions">
                    <button class="btn-load" onclick="loadRecord(${s.id})">読込</button>
                    <button class="btn-danger" onclick="deleteRecord(${s.id})">削除</button>
                </div>
            </div>`;
        }).join('');
    }

    function escHtml(str) {
        return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // ── 読込 ──────────────────────────────────────────
    function loadRecord(id) {
        const saves = loadSaves();
        const rec = saves.find(s => s.id === id);
        if (!rec) return;

        // まず全フィールドをクリア
        for (let i = 1; i <= 8; i++) {
            ['price','prep','rem'].forEach(k => { document.getElementById(`m${i}_${k}`).value = ''; });
        }

        rec.materials.forEach((m, idx) => {
            const n = idx + 1;
            if (n > 8) return;
            document.getElementById(`m${n}_price`).value = m.price;
            document.getElementById(`m${n}_prep`).value  = m.prep;
            document.getElementById(`m${n}_rem`).value   = m.rem;
        });
        document.getElementById('successCount').value = rec.successCount;
        document.getElementById('saveLabel').value    = rec.label;
        document.getElementById('auctionPrice').value = rec.auctionPrice != null ? rec.auctionPrice : '';

        showToast(`📂 「${rec.label}」を読み込みました`);
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // ── 削除 ──────────────────────────────────────────
    function deleteRecord(id) {
        const saves = loadSaves().filter(s => s.id !== id);
        storeSaves(saves);
        renderSavedList();
        showToast('🗑 削除しました');
    }

    document.getElementById('clearAllBtn').addEventListener('click', () => {
        if (!confirm('保存データをすべて削除しますか？')) return;
        storeSaves([]);
        renderSavedList();
        showToast('🗑 全データを削除しました');
    });

    // ── ボタンイベント ────────────────────────────────
    document.getElementById('calcBtn').addEventListener('click', () => {
        const result = doCalculate();
        if (result) saveRecord(result);
    });

    document.getElementById('calcOnlyBtn').addEventListener('click', () => {
        doCalculate();
    });

    document.getElementById('profitBtn').addEventListener('click', () => {
        const sell = parseFloat(document.getElementById('sellPrice').value) || 0;
        const box  = document.getElementById('profitResultBox');
        if (!sell) { showToast('⚠ 売値を入力してください'); return; }
        if (currentSuccessCount === 0) { box.innerHTML = '先に計算を実行してください'; box.style.display = 'block'; return; }

        const profitPer   = sell - currentCostPerItem;
        const totalProfit = profitPer * currentSuccessCount;
        const rate        = (profitPer / currentCostPerItem) * 100;

        box.className = 'profit-result-box ' + (profitPer > 0 ? 'is-profit' : profitPer < 0 ? 'is-loss' : '');
        if (profitPer > 0) {
            box.innerHTML = `<span class="profit-positive">✅ 利益: ${profitPer.toFixed(1)}万ギル/個</span><br>📈 利益率: ${rate.toFixed(1)}%<br>💰 総利益: ${totalProfit.toFixed(1)}万ギル`;
        } else if (profitPer === 0) {
            box.innerHTML = '⚖️ 損益ゼロ';
        } else {
            box.innerHTML = `<span class="profit-negative">❌ 損失: ${Math.abs(profitPer).toFixed(1)}万ギル/個</span><br>📉 損失率: ${Math.abs(rate).toFixed(1)}%<br>💸 総損失: ${Math.abs(totalProfit).toFixed(1)}万ギル`;
        }
        box.style.display = 'block';
    });

    // Enterキー
    document.addEventListener('keypress', e => {
        if (e.key !== 'Enter') return;
        if (document.activeElement === document.getElementById('sellPrice')) {
            document.getElementById('profitBtn').click();
        }
    });

    // ── 初期化 ────────────────────────────────────────
    renderSavedList();
</script>
</body>
</html>
